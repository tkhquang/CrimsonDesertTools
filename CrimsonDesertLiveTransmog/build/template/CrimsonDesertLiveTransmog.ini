; CrimsonDesertLiveTransmog.ini
; Runtime visual armor swap (transmog) for Crimson Desert.
;
; --- How it works ---
; Transmog swaps are managed through presets stored in the companion
; JSON file (CrimsonDesertLiveTransmog_presets.json). Use the ReShade
; overlay (Home key) to browse items, build presets, and apply them.
; This INI controls global settings and optional hotkey bindings.
;
; --- Hotkeys ---
; All hotkeys are DISABLED by default. The ReShade overlay provides
; full GUI control; hotkeys are optional shortcuts for users who
; prefer keyboard-driven workflows.
;
; Format: modifier+trigger (modifiers joined with +, last = trigger)
;   - Named keys: T, F3, Numpad1, Mouse4, Gamepad_A, etc.
;   - Modifiers: Ctrl, Shift, Alt
;   - Multiple combos: T,Gamepad_LB+Gamepad_Y  (T alone OR LB+Y)
;   - Empty = disabled
;
; Full input name reference:
;   https://github.com/tkhquang/DetourModKit?tab=readme-ov-file#supported-input-names

[General]
; Log level: Trace, Debug, Info, Warning, Error
LogLevel = Info
; Master toggle for all transmog swaps
Enabled = true

; --- General Hotkeys (all disabled by default) ---
; Toggle all transmog on/off
ToggleHotkey =
; Force-apply current preset to the player
ApplyHotkey =
; Clear all active transmog and restore original gear visuals
ClearHotkey =
; Snapshot currently equipped real gear into slot mappings
CaptureHotkey =

[Presets]
; --- Preset Hotkeys (all disabled by default) ---
; Capture current gear and save as a new preset
AppendHotkey =
; Overwrite active preset with current slot mappings
ReplaceHotkey =
; Delete the active preset
RemoveHotkey =
; Cycle to next preset and apply
NextHotkey =
; Cycle to previous preset and apply
PrevHotkey =
