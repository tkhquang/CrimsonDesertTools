; CrimsonDesertEquipHide.ini
; Toggle visibility of equipment parts with hotkeys.
;
; --- Hotkey ---
; Format: modifier+trigger (modifiers joined with +, last segment = trigger keys)
;   - Named keys: V, F3, Numpad1, Mouse4, Gamepad_A, etc.
;   - Modifiers: Ctrl, Shift, Alt (or LCtrl, RCtrl, LShift, RShift, LAlt, RAlt)
;   - Multiple independent combos: V,Gamepad_LB+Gamepad_Y  (V alone OR hold LB + press Y)
;   - If empty (Hotkey = ), no toggle for that category.
;
; Examples:
;   Hotkey = V                            ; V key
;   Hotkey = Numpad1                      ; Numpad 1
;   Hotkey = Ctrl+V                       ; Ctrl + V
;   Hotkey = Ctrl+Shift+H                 ; Ctrl + Shift + H
;   Hotkey = F3,Gamepad_LB+Gamepad_Y      ; F3 alone OR (hold LB + press Y)
;   Hotkey =                              ; disabled (no toggle)
;
; Refer to https://github.com/tkhquang/DetourModKit?tab=readme-ov-file#supported-input-names
; for the full list of supported input names.
;
; --- Parts ---
; Comma-separated part names. Move items between categories by cut/paste.
; Raw hex IDs (e.g. 0xAE1E) also accepted for unlisted/gap parts.
;
; --- Other ---
; DefaultHidden = true to start hidden on game load.
; Enabled = false to disable a category entirely (parts won't be tracked).

[General]
; Log level: Trace, Debug, Info, Warning, Error
LogLevel = Info

[OneHandWeapons]
Enabled = true
Hotkey = V
DefaultHidden = false
Parts = CD_MainWeapon_Sword_R, CD_MainWeapon_Sword_IN_R, CD_MainWeapon_Sword_L, CD_MainWeapon_Sword_IN_L, CD_MainWeapon_Dagger_R, CD_MainWeapon_Dagger_IN_R, CD_MainWeapon_Dagger_L, CD_MainWeapon_Dagger_IN_L, CD_MainWeapon_Axe_R, CD_MainWeapon_Axe_L, CD_MainWeapon_Mace_R, CD_MainWeapon_Mace_L, CD_MainWeapon_Hammer_R, CD_MainWeapon_Flail_R, CD_MainWeapon_Wand_R, CD_MainWeapon_Bola, CD_MainWeapon_Fist_R, CD_MainWeapon_Fist_L, CD_MainWeapon_HandCannon, CD_MainWeapon_Fist_Hand, CD_MainWeapon_Fist_Foot, CD_MainWeapon_Lance, CD_MainWeapon_Gauntlet, CD_MainWeapon_Gauntlet_L

