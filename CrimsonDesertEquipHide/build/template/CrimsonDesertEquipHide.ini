; CrimsonDesertEquipHide.ini
; Toggle visibility of equipment and armor parts with hotkeys.
;
; --- Hotkeys ---
; Format: modifier+trigger (modifiers joined with +, last segment = trigger keys)
;   - Named keys: V, F3, Numpad1, Mouse4, Gamepad_A, etc.
;   - Modifiers: Ctrl, Shift, Alt (or LCtrl, RCtrl, LShift, RShift, LAlt, RAlt)
;   - Multiple independent combos: V,Gamepad_LB+Gamepad_Y  (V alone OR hold LB + press Y)
;   - If empty, the binding is disabled.
;
; Three hotkey types per category:
;   ToggleHotkey = toggles hidden/visible (flip current state)
;   ShowHotkey   = always forces visible
;   HideHotkey   = always forces hidden
;
; Global overrides in [General]:
;   ShowAllHotkey = forces ALL categories visible
;   HideAllHotkey = forces ALL categories hidden
;
; Examples:
;   ToggleHotkey = V                       ; V key (toggles hidden/visible)
;   ToggleHotkey = Numpad1                 ; Numpad 1
;   ShowHotkey = Ctrl+V                    ; Ctrl + V forces visible
;   HideHotkey = Ctrl+Shift+H             ; Ctrl + Shift + H forces hidden
;   ToggleHotkey = F3,Gamepad_LB+Gamepad_Y ; F3 alone OR (hold LB + press Y)
;   ToggleHotkey =                         ; disabled (no binding)
;
; Refer to https://github.com/tkhquang/DetourModKit?tab=readme-ov-file#supported-input-names
; for the full list of supported input names.
;
; --- Parts ---
; Comma-separated part names. Move items between categories by cut/paste.
; Raw hex IDs (e.g. 0xAE1E) also accepted for unlisted/gap parts.
;
; --- Other ---
; DefaultHidden = true to start hidden on game load.
; Enabled = false to disable a category entirely (parts won't be tracked).

[General]
; Log level: Trace, Debug, Info, Warning, Error
LogLevel = Info
; Apply only to player characters
PlayerOnly = true
; Set to true if you use mods that alter the default visibility of
; equipment via PAZ patching (e.g. character replacers like
; "Playing Kliff as Damiane", armor replacers, transmog mods).
; ForceShow overrides their changes so toggling equipment back to
; visible still works.
; Safe to leave false if you are not using such mods.
ForceShow = false
; [Experimental] Prevents baldness when hiding helmets/cloaks.
; The game normally hides hair when a helmet is equipped — this fix keeps
; hair visible when the mod hides the helmet mesh.
; Note: Hair/beard may occasionally disappear; re-toggling the helmet
; (show then hide) restores it.
BaldFix = true
; Prevents hidden equipment from briefly flashing during state transitions
; (e.g. exiting gliding, cutscene transitions). Safe to leave enabled.
GlidingFix = true
; Force all categories visible / hidden at once (empty = disabled)
ShowAllHotkey =
HideAllHotkey =

